<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0b0b0b;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
    }

    .container{
      width:350px;
      background:#111;
      padding:30px;
      border-radius:15px;
      border:2px solid #ff1493;
      box-shadow:0 0 15px #ff1493;
    }

    .title{
      text-align:center;
      color:#ff1493;
      margin-bottom:15px;
      font-size:28px;
    }

    .text{
      text-align:center;
      font-size:14px;
      color:#ccc;
      margin-bottom:25px;
    }

    .field{
      margin-bottom:20px;
    }

    label{
      display:block;
      margin-bottom:8px;
    }

    input{
      width:100%;
      padding:12px;
      border:none;
      outline:none;
      border-radius:8px;
      background:#222;
      color:white;
      font-size:14px;
    }

    input:focus{
      border:1px solid #ff1493;
    }

    .btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#ff1493;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#ff4db8;
    }

    .footer{
      text-align:center;
      margin-top:20px;
      font-size:14px;
    }

    .footer a{
      color:#ff1493;
      text-decoration:none;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1 class="title">Forgot Password</h1>

    <p class="text">
      Enter your email address and we'll send you a password reset link.
    </p>

    <form>

      <div class="field">
        <label>Email Address</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <button type="submit" class="btn">
        Send Reset Link
      </button>

    </form>

    <div class="footer">
      <a href="index.html">Back to Sign In</a>
    </div>

  </div>

</body>
</html>
